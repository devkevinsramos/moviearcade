<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lobby | MovieArcade</title>
  <meta name="theme-color" content="#050505">
  <link rel="icon" type="image/svg+xml" href="assets/img/logo_m.svg">
  <link rel="apple-touch-icon" href="assets/img/logo_m.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-page="index">
  <!-- Header global -->
  <header class="site-header">
    <nav class="page nav">
      <a class="brand" data-link="index" href="index.html">
        <img class="brand-logo" src="assets/img/logo_stars.svg" alt="MovieArcade">
      </a>

      <button class="menu-toggle" type="button" aria-label="Abrir menu" data-menu-toggle>☰</button>

      <div class="nav-links" data-nav-links>
        <a class="nav-link" data-link="home" href="pages/home.html">Home</a>
        <a class="nav-link" data-link="arcades" href="pages/arcades.html">Arcades</a>
        <a class="nav-link" data-link="movies" href="pages/movies.html">Movies</a>
        <a class="nav-link" data-link="about" href="pages/about.html">About</a>
      </div>
    </nav>
  </header>

  <main class="hero page">
    <section class="hero-grid">
      <!-- Texto principal do lobby -->
      <div class="reveal">
        <p class="eyebrow">start lobby</p>
        <h1 class="title">Bem-vindo ao<br><span class="title-accent">MovieArcade.</span></h1>
        <p class="lead">
          Um projeto interativo focado em arcades de filmes, trazendo a sétima arte para o mundo dos minigames com o desenvolvimento front-end.
        </p>

        <div class="actions">
          <a class="btn btn-primary" data-link="home" href="pages/home.html">Conheça o projeto</a>
          <a class="btn btn-ghost" data-link="about" href="pages/about.html">Ver sobre</a>
        </div>
      </div>

      <!-- Card lateral com vídeo em loop -->
      <article class="panel media-card reveal delay">
        <div class="media-shell">
          <video autoplay muted loop playsinline>
            <source src="assets/img/mov/martymauser.mp4" type="video/mp4">
          </video>
        </div>
        <div class="media-label media-quote">
          <span>"Dream big."</span>
        </div>
      </article>
    </section>
  </main>

  <footer class="footer">
    <div class="page footer-row">
      <span>Made for movie lovers.</span>
      <span>Developed by <a href="https://github.com/devkevinsramos" target="_blank" rel="noreferrer">@devkevinsramos</a></span>
    </div>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
